<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品名稱 | Pei-Hua Yang</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/work-detail.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <header class="detail-header">
    <a href="index.html#works" class="back-link">&larr; <span data-zh="返回作品" data-en="Back to Works">返回作品</span></a>
    <button class="lang-toggle" id="langToggleDetail">EN</button>
  </header>

  <main class="work-detail">
    <!-- 作品主圖 -->
    <div class="work-hero">
      <img src="images/works/work1-full.jpg" alt="作品名稱">
    </div>

    <!-- 作品資訊 -->
    <div class="work-info">
      <h1 data-zh="作品名稱" data-en="Work Title">作品名稱</h1>
      <p class="work-year">2024</p>
      <p class="work-medium" data-zh="媒材：複合媒材" data-en="Medium: Mixed media">媒材：複合媒材</p>
      <p class="work-dimensions" data-zh="尺寸：120 x 90 cm" data-en="Dimensions: 120 x 90 cm">尺寸：120 x 90 cm</p>
    </div>

    <!-- 作品描述 -->
    <div class="work-description">
      <p data-zh="在此填入這件作品的描述文字..." data-en="Enter the description for this work here...">在此填入這件作品的描述文字...</p>
    </div>

    <!-- 更多圖片 -->
    <div class="work-gallery">
      <img src="images/works/work1-detail1.jpg" alt="細節圖一">
      <img src="images/works/work1-detail2.jpg" alt="細節圖二">
      <img src="images/works/work1-detail3.jpg" alt="展場照片">
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
