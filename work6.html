    <!-- 作品描述 -->
    <div class="work-description">
      <div data-zh="當我說「一顆石頭」，便在每個人的腦海裡產生千萬種形狀的可能。然而，沒有一個是不真實的。" data-en="&lt;strong&gt;When I say &quot;a stone,&quot; countless possible shapes emerge in each person's mind. Yet none of them are any less real.&lt;/strong&gt;" style="color: var(--text-light);">
        <p>當我說「一顆石頭」，便在每個人的腦海裡產生千萬種形狀的可能。然而，沒有一個是不真實的。</p>
      </div>

      <div class="work-spaced" data-zh="講述散步於臺南藝術大學校園、烏山頭水庫與水庫風景區所不期而遇的經歷，穿插沿路收集而來的環境音與風景區阿姨的導覽。這些片段並非依循時間線鋪陳，而是在言說、聲音與記憶之間交錯展開。

演出於猶如半裸露的後台現場形式發表，言談間在流言、閒聊、導覽介紹、日記式口白、擬音等敘事方式之間滑移，串起我們與週遭，隱匿於日常之下的關係，那些聽起來微不足道的細節，連接成事物的種種關聯，去到一個從前可能被遮蔽的世界。" data-en="The narration recounts chance encounters during walks through the campus of Tainan National University of the Arts, Wushantou Reservoir, and its surrounding scenic area. Interwoven are environmental sounds gathered along the way, along with audio excerpts from a local tour guide. These fragments do not unfold along a linear timeline, but instead emerge through an interplay of speech, sound, and memory.

The performance is presented in a setting resembling an exposed backstage. The narration moves fluidly between gossip, casual conversation, audio excerpts from a local tour guide, diary-like monologue, and foley-like sound, weaving together the often-hidden relationships between ourselves and our surroundings. These seemingly insignificant details gradually connect into a network of relations, leading us, through narration, toward a world that may once have been obscured.">

        <p>演出於猶如半裸露的後台現場形式發表，言談間在流言、閒聊、導覽介紹、日記式口白、擬音等敘事方式之間滑移，串起我們與週遭，隱匿於日常之下的關係，那些聽起來微不足道的細節，連接成事物的種種關聯，去到一個從前可能被遮蔽的世界。</p>

    <div class="carousel" id="carousel">

        <img src="images/works/work6-3-thumb.JPG" alt="風穿過石頭的裂縫發出聲音 2" class="carousel-slide">

  <!-- 影片 -->

    <p style="margin-bottom:1rem; font-size:0.85rem;" data-zh="完整記錄 00:11:00" data-en="Full documentation 00:11:00">完整記錄 00:11:00</p>

  <!-- 全螢幕圖片檢視 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>


  <script src="js/main.js"></script>
  <script>
    // 返回作品頁
    document.getElementById('backToWorks').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'index.html?page=works';
    });

    // ===== 輪播 =====
    const track = document.getElementById('carouselTrack');
    const slides = track.querySelectorAll('.carousel-slide');
    const carousel = document.getElementById('carousel');
    const prevBtn = document.getElementById('carouselPrev');
    const nextBtn = document.getElementById('carouselNext');
    let currentSlide = 0;

    function goToSlide(index) {
      currentSlide = index;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      // 更新箭頭顯示
      prevBtn.style.opacity = currentSlide === 0 ? '0' : '';
      prevBtn.style.pointerEvents = currentSlide === 0 ? 'none' : '';
      nextBtn.style.opacity = currentSlide === slides.length - 1 ? '0' : '';
      nextBtn.style.pointerEvents = currentSlide === slides.length - 1 ? 'none' : '';
    }

    prevBtn.addEventListener('click', () => {
      if (currentSlide > 0) goToSlide(currentSlide - 1);
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlide < slides.length - 1) goToSlide(currentSlide + 1);
    });

    // 初始化箭頭狀態
    goToSlide(0);

    // 觸控滑動支援
    let touchStartX = 0;
    carousel.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });

    carousel.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < slides.length - 1) {
          goToSlide(currentSlide + 1);
        } else if (diff < 0 && currentSlide > 0) {
          goToSlide(currentSlide - 1);
        }
      }
    });

    // ===== 點擊圖片放大 =====
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    // 主圖點擊放大
    document.querySelector('.hero-clickable').addEventListener('click', function() {
      lightboxImg.src = this.src;
      lightbox.classList.add('active');
    });

    // 輪播圖片點擊放大
    slides.forEach(slide => {
      slide.addEventListener('click', () => {
        lightboxImg.src = slide.src;
        lightbox.classList.add('active');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
      }
    });

  </script>
