<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東門鬱金香 Dongmen Tulips | Pei Hua</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/work-detail.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <header class="detail-header">
    <a href="index.html" class="back-link" id="backToWorks">&larr;</a>
    <button class="lang-toggle" id="langToggleDetail">EN</button>
  </header>

  <main class="work-detail">
    <!-- 1. 主圖 -->
    <div class="work-hero">
      <img src="images/works/1-1 (1).jpg" alt="東門鬱金香" style="max-height: 75vh; width: auto; margin: 0 auto; display: block;">
    </div>

    <!-- 2. 作品資訊 -->
    <div class="work-info">
      <h1 data-zh="東門鬱金香" data-en="Dongmen Tulips">東門鬱金香</h1>
      <p class="work-meta"><span>2018</span>, <span data-zh="人造花、盆器" data-en="Artificial flowers, pots">人造花、盆器</span></p>
    </div>

    <!-- 3. 作品描述 -->
    <div class="work-description">
      <div data-zh="我偷偷將兩盆人造花放置於市場的露臺與屋頂。" data-en="I secretly placed two pots of artificial flowers on the terrace and rooftop of the market.">
        <p>我偷偷將兩盆人造花放置於市場的露臺與屋頂。</p>
      </div>

      <div class="work-spaced" data-zh="這裡除了是市場也居住一些住戶和遊民，1900年建立的新竹東門市場正在經歷一次轉型，創作契機來自朋友發起的地下創作行動，其初衷在於探問藝術進駐是否能為市場帶來「活化」，以及這種介入本身的意義，而我逐漸將關注從行動本身轉向對自身介入的反思。

一年之後，當我再次回到這，發現盆栽有了接續地的使用。" data-en="In addition to being a marketplace, the site is also inhabited by residents and unhoused individuals. Established in 1900, Dongmen Market in Hsinchu has been undergoing a process of transformation. The work emerged from an underground artistic initiative initiated by a friend, which sought to question whether artistic interventions could &quot;revitalize&quot; the market, and what such interventions might mean. Gradually, my focus shifted from the action itself to a reflection on my own intervention.

A year later, when I returned, I found that the pots had been taken up and folded into daily life.">
        <p>這裡除了是市場也居住一些住戶和遊民，1900年建立的新竹東門市場正在經歷一次轉型，創作契機來自朋友發起的地下創作行動，其初衷在於探問藝術進駐是否能為市場帶來「活化」，以及這種介入本身的意義，而我逐漸將關注從行動本身轉向對自身介入的反思。</p>
        <p>一年之後，當我再次回到這，發現盆栽有了接續地的使用。</p>
      </div>
    </div>

    <!-- 4. 圖片輪播 -->
    <div class="carousel" id="carousel">
      <button class="carousel-arrow carousel-prev" id="carouselPrev">&lsaquo;</button>
      <div class="carousel-track-wrapper">
        <div class="carousel-track" id="carouselTrack">
          <img src="images/works/1-1 (2).jpg" alt="東門鬱金香 1" class="carousel-slide">
          <img src="images/works/2 (1).jpg" alt="東門鬱金香 2" class="carousel-slide">
          <img src="images/works/2 (2).jpg" alt="東門鬱金香 3" class="carousel-slide">
          <img src="images/works/3 (1).jpg" alt="東門鬱金香 4" class="carousel-slide">
          <img src="images/works/3 (2).jpg" alt="東門鬱金香 5" class="carousel-slide">
        </div>
      </div>
      <button class="carousel-arrow carousel-next" id="carouselNext">&rsaquo;</button>
    </div>
  </main>

  <!-- 全螢幕圖片檢視 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <script src="js/main.js"></script>
  <script>
    // 返回作品頁
    document.getElementById('backToWorks').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'index.html?page=works';
    });

    // ===== 輪播 =====
    const track = document.getElementById('carouselTrack');
    const slides = track.querySelectorAll('.carousel-slide');
    const carousel = document.getElementById('carousel');
    const prevBtn = document.getElementById('carouselPrev');
    const nextBtn = document.getElementById('carouselNext');
    let currentSlide = 0;

    function goToSlide(index) {
      currentSlide = index;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      prevBtn.style.opacity = currentSlide === 0 ? '0' : '';
      prevBtn.style.pointerEvents = currentSlide === 0 ? 'none' : '';
      nextBtn.style.opacity = currentSlide === slides.length - 1 ? '0' : '';
      nextBtn.style.pointerEvents = currentSlide === slides.length - 1 ? 'none' : '';
    }

    prevBtn.addEventListener('click', () => {
      if (currentSlide > 0) goToSlide(currentSlide - 1);
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlide < slides.length - 1) goToSlide(currentSlide + 1);
    });

    goToSlide(0);

    // 觸控滑動
    let touchStartX = 0;
    carousel.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });
    carousel.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < slides.length - 1) goToSlide(currentSlide + 1);
        else if (diff < 0 && currentSlide > 0) goToSlide(currentSlide - 1);
      }
    });

    // ===== 點擊圖片放大 =====
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    document.querySelectorAll('.work-hero img, .carousel-slide').forEach(img => {
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.add('active');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('active');
    });
  </script>
</body>
</html>
